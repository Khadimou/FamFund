                      content: |
                        <div style="font-family:sans-serif;max-width:560px;margin:0 auto;color:#1a2e1e;line-height:1.6">
                          <p style="color:#666;font-size:13px;margin-bottom:24px">FamilyFund</p>
                          <h2 style="color:#2d6a4f;font-size:22px;margin-bottom:16px">&#34;Je verrai ce que je peux faire…&#34;</h2>
                          <p>Bonjour,</p>
                          <p>Vous avez peut-être déjà entendu cette phrase. Elle ne signifie pas forcément un refus. Elle signifie souvent : <em>&#34;Je ne sais pas comment répondre à ça sans me mettre en difficulté.&#34;</em></p>
                          <p>Vos proches ne savent pas :</p>
                          <ul style="padding-left:20px;margin:16px 0">
                            <li style="margin-bottom:8px">combien les autres donnent (et ne veulent pas paraître radins)</li>
                            <li style="margin-bottom:8px">si leur contribution compte vraiment</li>
                            <li style="margin-bottom:8px">comment dire non sans abîmer la relation</li>
                          </ul>
                          <p>FamilyFund résout précisément ce problème : chaque proche répond <strong>en privé</strong>, à son rythme, sans voir ce que les autres ont décidé.</p>
                          <p>Vous, vous voyez tout. Eux, ils sont à l&#39;aise.</p>
                          <p style="margin:28px 0;padding:16px 20px;background:#f0faf5;border-left:3px solid #2d6a4f;border-radius:4px">
                            Le résultat : moins de conversations gênantes, des engagements plus sincères.
                          </p>
                          <p>Vos proches méritent de pouvoir vous soutenir sans pression. C&#39;est ce qu&#39;on rend possible.<br>— <strong>L&#39;équipe FamilyFund</strong></p>
                          <hr style="border:none;border-top:1px solid #e5e7eb;margin:32px 0"/>
                          <p style="color:#999;font-size:12px">
                            FamilyFund · <a href="https://familyfund.fr" style="color:#2d6a4f">familyfund.fr</a> ·
                            <a href="{{ unsubscribe }}" style="color:#999">Se désabonner</a>
                          </p>
                        </div>
