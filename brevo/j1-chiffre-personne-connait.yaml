                      content: |
                        <div style="font-family:sans-serif;max-width:560px;margin:0 auto;color:#1a2e1e;line-height:1.6">
                          <p style="color:#666;font-size:13px;margin-bottom:24px">FamilyFund</p>
                          <h2 style="color:#2d6a4f;font-size:22px;margin-bottom:16px">Le chiffre que personne ne dit aux entrepreneurs</h2>
                          <p>Bonjour,</p>
                          <p>J&#39;espère que le guide vous a été utile.</p>
                          <p>Un chiffre qui devrait vous alerter : <strong>plus de 60 % des prêts entre proches</strong> ne font l&#39;objet d&#39;aucun document écrit.</p>
                          <p>Résultat : quand l&#39;argent tarde à être remboursé, chacun se souvient différemment des conditions. La relation en prend un coup — parfois de façon irréversible.</p>
                          <p>Et côté fiscal, un prêt non déclaré au-dessus de 1 500 € peut être requalifié en donation par l&#39;administration. Les droits applicables : jusqu&#39;à 45 %.</p>
                          <p style="margin:28px 0;padding:16px 20px;background:#f0faf5;border-left:3px solid #2d6a4f;border-radius:4px">
                            <strong>La bonne nouvelle :</strong> formaliser un prêt familial prend moins d&#39;une heure si vous avez le bon cadre.
                          </p>
                          <p>C&#39;est exactement ce que FamilyFund prépare pour vous.</p>
                          <p>Si cette situation vous parle, vous n&#39;êtes pas seul. C&#39;est exactement pour ça qu&#39;on construit FamilyFund.<br>— <strong>L&#39;équipe FamilyFund</strong></p>
                          <hr style="border:none;border-top:1px solid #e5e7eb;margin:32px 0"/>
                          <p style="color:#999;font-size:12px">
                            FamilyFund · <a href="https://familyfund.fr" style="color:#2d6a4f">familyfund.fr</a> ·
                            <a href="{{ unsubscribe }}" style="color:#999">Se désabonner</a>
                          </p>
                        </div>
