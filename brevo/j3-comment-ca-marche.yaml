                      content: |
                        <div style="font-family:sans-serif;max-width:560px;margin:0 auto;color:#1a2e1e;line-height:1.6">
                          <p style="color:#666;font-size:13px;margin-bottom:24px">FamilyFund</p>
                          <h2 style="color:#2d6a4f;font-size:22px;margin-bottom:16px">La plateforme, en 3 étapes</h2>
                          <p>Bonjour,</p>
                          <p>Voici comment FamilyFund fonctionne concrètement :</p>
                          <div style="margin:24px 0;padding:20px;background:#f0faf5;border-radius:10px">
                            <p style="margin:0 0 12px"><strong style="color:#2d6a4f">01 —</strong> Vous créez un espace privé en 2 minutes et invitez vos proches par lien.</p>
                            <p style="margin:0 0 12px"><strong style="color:#2d6a4f">02 —</strong> Chacun indique en toute confidentialité ce qu&#39;il peut donner ou prêter. Les autres ne voient rien.</p>
                            <p style="margin:0"><strong style="color:#2d6a4f">03 —</strong> Vous accédez à une vue consolidée : montants, formes d&#39;engagement, statuts. Vous pilotez tout depuis un tableau de bord privé.</p>
                          </div>
                          <p>Le tout sans application à télécharger pour vos proches, sans données financières exposées, et avec les modèles de documents légaux inclus.</p>
                          <p>Des questions ? Répondez directement à cet email, on lit tout.<br>— <strong>L&#39;équipe FamilyFund</strong></p>
                          <hr style="border:none;border-top:1px solid #e5e7eb;margin:32px 0"/>
                          <p style="color:#999;font-size:12px">
                            FamilyFund · <a href="https://familyfund.fr" style="color:#2d6a4f">familyfund.fr</a> ·
                            <a href="{{ unsubscribe }}" style="color:#999">Se désabonner</a>
                          </p>
                        </div>
